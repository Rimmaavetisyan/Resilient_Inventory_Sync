server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward /api/* to the mock backend so the built React app
    # uses the same relative URLs it uses in dev (no hardcoded host).
    location /api/ {
        proxy_pass http://mock-backend:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # React Router: always serve index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
